    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#c73418",
                        "background-light": "#efeedf",
                        "background-dark": "#1a2e1a",
                        "glass-light": "rgba(255, 255, 255, 0.4)",

                        black: "#000000",
                    },
                    fontFamily: {
                        display: ["Google Sans", "sans-serif"],
                        body: ["Google Sans", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': "1.5rem",
                        '2xl': "2rem",

                    <span class="text-lg sm:text-xl font-bold text-black dark:text-white tracking-tight">Installateur
                        Notdienst Linz</span>
                </a>
                <button
                    class="sm:hidden p-2 rounded-full hover:bg-white/20 dark:hover:bg-black/20 text-black dark:text-white transition"
                    onclick="document.getElementById('theme-toggle').click()">
                    <span class="material-symbols-outlined text-xl">brightness_4</span>
                </button>
            </div>
            <div class="flex items-center gap-4 w-full sm:w-auto">

                <a class="flex justify-center w-full sm:w-auto items-center gap-2 px-5 py-2 bg-primary text-white rounded-xl font-bold shadow-md transition-all hover:bg-red-900"
                    href="tel:066493342464">
                    <span class="material-symbols-outlined text-sm">call</span>
                    24/7 Notruf

    <main class="relative z-10 pt-36 sm:pt-32 pb-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto w-full flex-grow text-left">
        <div class="glass-card bg-white/40 backdrop-blur-md border border-white/30 rounded-3xl p-8 md:p-12 shadow-xl">
            <h1 class="text-4xl font-bold text-primary mb-8 tracking-tight">Sitemap</h1>

            <div class="space-y-4 text-gray-700 dark:text-gray-300">
                <ul class="list-disc list-inside space-y-3 pl-4">

                    </li>
                    <li><a href="kontakt.html"

                    <li><a href="impressum.html"
                            class="text-lg font-medium hover:text-primary transition-colors">Impressum</a></li>
                    <li><a href="sitemap.html"
                            class="text-lg font-medium hover:text-primary transition-colors">Sitemap</a></li>
                </ul>
            </div>
        </div>
    </main>

    <footer class="relative z-10 px-6 pb-12 mt-24">
        <div
            class="max-w-7xl mx-auto glass-panel bg-glass-light/70 dark:bg-glass-dark/70 rounded-2xl p-6 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex flex-col sm:flex-row items-center gap-4 sm:gap-6 flex-1 w-full sm:w-auto">
                <div class="flex items-center justify-center gap-2">

                    <span
                        class="text-lg font-bold text-black dark:text-white tracking-tight text-center sm:text-left">Installateur
                        Notdienst

                </div>
                <nav
                    class="flex flex-wrap justify-center sm:justify-start items-center gap-4 sm:gap-6 text-sm font-medium text-gray-700 dark:text-gray-300 sm:ml-4">
                    <a class="hover:text-primary transition-colors" href="sitemap.html">Sitemap</a>
                    <a class="hover:text-primary transition-colors" href="impressum.html">Impressum</a>
                    <a class="hover:text-primary transition-colors" href="kontakt.html">Kontakt</a>
                    <a class="hover:text-primary transition-colors"

            <a class="flex items-center gap-3 px-6 py-3 bg-primary text-white rounded-xl font-bold shadow-lg transition-all whitespace-nowrap hover:bg-red-900"
                href="tel:066493342464">
                <span class="material-symbols-outlined">call</span>0664 9334 2464
            </a>
        </div>
        <div
            class="absolute -z-10 bottom-0 right-0 w-96 h-96 bg-primary/20 blur-[100px] rounded-full translate-x-1/2 translate-y-1/2">
        </div>
    </footer>
    <script>
        const toggleButton = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        toggleButton.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
            } else {
                htmlElement.classList.add('dark');
            }
        });
    </script>
</body>

</html>
